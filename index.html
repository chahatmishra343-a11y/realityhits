<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>trying my best // Multi-Matrix AR Engine</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --panel-bg: rgba(5, 5, 10, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            position: relative;
        }

        /* Full Screen Selfie Mirror Video Background */
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Perfect mirror alignment */
            z-index: 1;
            filter: brightness(0.5) contrast(1.2);
        }

        /* 2D Neon Canvas Layer */
        #drawingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* 3D WebGL Particle Layer */
        #webglCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* Diagnostic Skeletal Overlays Layer */
        #trackingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 3;
            transform: scaleX(-1);
            pointer-events: none;
            opacity: 0.3;
        }

        /* Upper Interactive Dashboard Control UI */
        .control-panel {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 92%;
            max-width: 650px;
            backdrop-filter: blur(8px);
        }

        /* Mode Switch Buttons */
        .mode-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 5px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
        }

        .mode-toggle.active {
            background: var(--neon-pink);
            color: #fff;
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .panel-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        input[type="color"] {
            background: transparent;
            border: none;
            width: 25px;
            height: 25px;
            cursor: pointer;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            height: 4px;
            border-radius: 2px;
            outline: none;
            width: 60px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-blue);
        }

        .hud-status {
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 15px;
            background: rgba(0,0,0,0.6);
            min-width: 100px;
            text-align: center;
            border: 1px solid #333;
        }

        .state-draw, .state-swarm { color: #00ff55; border-color: #00ff55; }
        .state-erase, .state-expand { color: #ff0055; border-color: #ff0055; }
        .state-pause, .state-blast { color: #ffcc00; border-color: #ffcc00; }
        .state-loading { color: #aaa; border-color: #333; }

        .clear-btn {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 15px;
        }

        @media (min-width: 600px) {
            input[type="range"] { width: 90px; }
            .control-panel { padding: 12px 25px; border-radius: 50px; gap: 20px; width: auto; }
            label { font-size: 0.8rem; }
            .hud-status, .clear-btn, .mode-toggle { font-size: 0.8rem; padding: 6px 14px; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="mode-toggle active" id="btnDraw" onclick="switchEngine('DRAW')">[ NEON DRAW ]</button>
        <button class="mode-toggle" id="btnSwarm" onclick="switchEngine('SWARM')">[ QUANTUM SWARM ]</button>
        
        <div id="drawControls" style="display: flex; align-items: center; gap: 15px;">
            <div class="panel-group">
                <label>CLR</label>
                <input type="color" id="brushColor" value="#00f0ff">
            </div>
            <div class="panel-group">
                <label>SIZE</label>
                <input type="range" id="brushSize" min="4" max="35" value="12">
            </div>
            <button class="clear-btn" onclick="clearDrawCanvas()">CLEAR</button>
        </div>

        <div class="hud-status state-loading" id="hudState">LOADING_AI...</div>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="trackingOverlay"></canvas>

    <canvas id="webglCanvas"></canvas>
    <canvas id="drawingCanvas"></canvas>

    <script>
        let currentEngine = "DRAW"; // DRAW or SWARM
        let lastX = null, lastY = null;
        let handPresent = false;
        let targetX = 0, targetY = 0, targetZ = 0;
        let quantumMode = "SWARM";
        let targetRadius = 0.4;

        const video = document.getElementById('webcam');
        const overlayCanvas = document.getElementById('trackingOverlay');
        const oCtx = overlayCanvas.getContext('2d');
        const hudState = document.getElementById('hudState');

        // 2D Elements
        const dCanvas = document.getElementById('drawingCanvas');
        const dCtx = dCanvas.getContext('2d');
        const colorPicker = document.getElementById('brushColor');
        const sizeSlider = document.getElementById('brushSize');
        const drawControls = document.getElementById('drawControls');

        // Buttons
        const btnDraw = document.getElementById('btnDraw');
        const btnSwarm = document.getElementById('btnSwarm');

        // --- SCREEN LAYOUT ARCHITECTURE INITIALIZATION ---
        function resizeElements() {
            dCanvas.width = window.innerWidth;
            dCanvas.height = window.innerHeight;
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        }

        function clearDrawCanvas() {
            dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        }

        function switchEngine(engine) {
            currentEngine = engine;
            if (engine === 'DRAW') {
                btnDraw.className = "mode-toggle active";
                btnSwarm.className = "mode-toggle";
                drawControls.style.display = "flex";
                document.getElementById('webglCanvas').style.display = "none";
                dCanvas.style.display = "block";
            } else {
                btnDraw.className = "mode-toggle";
                btnSwarm.className = "mode-toggle active";
                drawControls.style.display = "none";
                document.getElementById('webglCanvas').style.display = "block";
                dCanvas.style.display = "none";
            }
            lastX = null; lastY = null;
        }

        // --- THREE.JS 3D PARTICLE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webglCanvas'), alpha: true, antialias: true });
        
        const particleCount = 4500; // Smoother performance metrics on mobile viewports
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        function generateTexture() {
            const c = document.createElement('canvas'); c.width = 32; c.height = 32;
            const ctx = c.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(0,240,255,0.8)');
            grad.addColorStop(0.6, 'rgba(255,0,127,0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(c);
        }

        for(let i=0; i<particleCount*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 10;
            positions[i+1] = (Math.random() - 0.5) * 10;
            positions[i+2] = (Math.random() - 0.5) * 5;
            const mix = Math.random();
            colors[i] = mix > 0.5 ? 0.0 : 1.0;
            colors[i+1] = mix > 0.5 ? 0.95 : 0.0;
            colors[i+2] = mix > 0.5 ? 1.0 : 0.5;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.16, map: generateTexture(), vertexColors: true,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const system = new THREE.Points(geometry, material);
        scene.add(system);

        // --- AIR DRAWING ALGORITHMS ---
        function executeDraw(landmarks, gesture) {
            const indexTip = landmarks[8];
            const targetX = (1 - indexTip.x) * dCanvas.width;
            const targetY = indexTip.y * dCanvas.height;

            hudState.innerText = gesture + "_MODE";
            hudState.className = `hud-status state-${gesture.toLowerCase()}`;

            if (gesture === "DRAW") {
                if (lastX !== null && lastY !== null) {
                    dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(targetX, targetY);
                    dCtx.strokeStyle = colorPicker.value; dCtx.lineWidth = sizeSlider.value;
                    dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
                    dCtx.shadowColor = colorPicker.value; dCtx.shadowBlur = parseInt(sizeSlider.value) * 1.4;
                    dCtx.stroke();
                    
                    dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(targetX, targetY);
                    dCtx.strokeStyle = "#ffffff"; dCtx.lineWidth = parseInt(sizeSlider.value) * 0.25;
                    dCtx.shadowBlur = 0; dCtx.stroke();
                }
                lastX = targetX; lastY = targetY;
            } else if (gesture === "ERASE") {
                dCtx.save(); dCtx.globalCompositeOperation = 'destination-out';
                dCtx.beginPath(); dCtx.arc(targetX, targetY, parseInt(sizeSlider.value) * 2.5, 0, Math.PI * 2);
                dCtx.fill(); dCtx.restore();
                lastX = null; lastY = null;
            } else {
                lastX = null; lastY = null;
            }
        }

        // --- GESTURE DECISION ENGINE ---
        function processTracking(landmarks) {
            const indexTip = landmarks[8], indexPip = landmarks[6];
            const middleTip = landmarks[12], ringTip = landmarks[16], pinkyTip = landmarks[20], thumbTip = landmarks[4];

            const isIndex = indexTip.y < indexPip.y;
            const isMiddle = middleTip.y < landmarks[10].y;
            const isRing = ringTip.y < landmarks[14].y;
            const isPinky = pinkyTip.y < landmarks[18].y;

            if (currentEngine === "DRAW") {
                if (isIndex && !isMiddle && !isRing) return "DRAW";
                if (isIndex && isMiddle && isRing && isPinky) return "ERASE";
                return "PAUSE";
            } else {
                const gap = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                if (gap < 0.07 && isRing && isPinky) {
                    targetRadius = THREE.MathUtils.mapLinear(gap, 0.02, 0.07, 0.2, 2.2);
                    return "EXPAND";
                }
                if (isIndex && !isMiddle && !isRing) return "BLAST";
                return "SWARM";
            }
        }

        function onResults(results) {
            if(overlayCanvas.width !== video.videoWidth) {
                overlayCanvas.width = video.videoWidth; overlayCanvas.height = video.videoHeight;
            }
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handPresent = true;
                const hand = results.multiHandLandmarks[0];
                
                drawConnectors(oCtx, hand, HAND_CONNECTIONS, {color: '#00f0ff', lineWidth: 2});
                drawLandmarks(oCtx, hand, {color: '#ff007f', radius: 3});

                const gesture = processTracking(hand);

                if (currentEngine === "DRAW") {
                    executeDraw(hand, gesture);
                } else {
                    quantumMode = gesture;
                    const node = (gesture === "BLAST") ? hand[8] : hand[9];
                    targetX = (1 - node.x - 0.5) * 7.5 * (window.innerWidth / window.innerHeight);
                    targetY = (0.5 - node.y) * 7.5;
                    targetZ = -node.z * 4;

                    hudState.innerText = quantumMode + "_ENGAGED";
                    hudState.className = `hud-status state-${quantumMode.toLowerCase()}`;
                }
            } else {
                handPresent = false;
                lastX = null; lastY = null;
                hudState.innerText = "AWAITING_PALM";
                hudState.className = "hud-status state-loading";
            }
        }

        // --- WEBGL SIMULATION MATH TIMELINE ---
        const clock = new THREE.Clock();
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            const dt = clock.getDelta();
            const posAttr = geometry.attributes.position;
            const time = clock.getElapsedTime();

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                let px = posAttr.array[i3], py = posAttr.array[i3+1], pz = posAttr.array[i3+2];

                if (handPresent && currentEngine === "SWARM") {
                    if (quantumMode === "SWARM" || quantumMode === "EXPAND") {
                        const u = (i * 0.17) % (Math.PI * 2); const v = (i * 0.63) % Math.PI;
                        const r = targetRadius + Math.sin(time * 3 + i) * 0.05;
                        const sx = targetX + r * Math.sin(v) * Math.cos(u);
                        const sy = targetY + r * Math.sin(v) * Math.sin(u);
                        const sz = targetZ + r * Math.cos(v);

                        velocities[i3] += (sx - px) * 5.0 * dt;
                        velocities[i3+1] += (sy - py) * 5.0 * dt;
                        velocities[i3+2] += (sz - pz) * 5.0 * dt;
                        velocities[i3] *= 0.85; velocities[i3+1] *= 0.85; velocities[i3+2] *= 0.85;
                    } else if (quantumMode === "BLAST") {
                        velocities[i3] += ((targetX - px) * 7.0 - velocities[i3+1] * 0.3) * dt;
                        velocities[i3+1] += ((targetY - py) * 7.0 + velocities[i3] * 0.3) * dt;
                        velocities[i3+2] += ((targetZ - pz) * 7.0) * dt;
                        velocities[i3] *= 0.9; velocities[i3+1] *= 0.9; velocities[i3+2] *= 0.9;
                    }
                } else {
                    // Nebulous Space Drift
                    velocities[i3] += Math.sin(time + i) * 0.08 * dt;
                    velocities[i3+1] += Math.cos(time * 0.7 + i) * 0.08 * dt;
                    velocities[i3] *= 0.94; velocities[i3+1] *= 0.94; velocities[i3+2] *= 0.94;
                }

                posAttr.array[i3] += velocities[i3];
                posAttr.array[i3+1] += velocities[i3+1];
                posAttr.array[i3+2] += velocities[i3+2];
            }
            posAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }

        // --- ENGINE SYSTEMS INITIALIZATION ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
        hands.onResults(onResults);

        const cameraPipe = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            facingMode: 'user',
            width: window.innerWidth > 600 ? 640 : 320, height: window.innerWidth > 600 ? 480 : 240
        });

        // Start Systems
        resizeElements();
        window.addEventListener('resize', resizeElements);
        switchEngine('DRAW'); // Start in neon draw mode by default

        cameraPipe.start().then(() => {
            animateParticles();
        });
    </script>
</body>
</html>
